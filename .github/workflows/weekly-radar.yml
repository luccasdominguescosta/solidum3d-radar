name: Solidum3D Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '0 12 * * 1'

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar Radar
        run: python -m src.solidum_radar.run_pipeline

      - name: Commitar CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f outputs/radar_multifontes_output.csv
          git commit -m "Atualiza radar multifontes" || echo "Sem mudanças para commitar"
          git push
