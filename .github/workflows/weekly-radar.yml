name: Solidum3D Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '0 12 * * 1'

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar Radar
        run: |
          python -m src.solidum_radar.run_pipeline

      - name: Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: radar-output
          path: outputs/radar_multifontes_output.csv
